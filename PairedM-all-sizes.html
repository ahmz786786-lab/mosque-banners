<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PairedM — All Sizes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2c2c2c;
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* ── Toolbar ── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    width: 100%;
    background: #1a1a1a;
    border-bottom: 2px solid #c9a84c;
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
  }
  .toolbar button {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 8px 22px;
    border: 2px solid #c9a84c;
    border-radius: 6px;
    background: transparent;
    color: #c9a84c;
    cursor: pointer;
    transition: all .2s;
  }
  .toolbar button:hover { background: rgba(201,168,76,.15); }
  .toolbar button.active {
    background: #c9a84c;
    color: #1a1a1a;
  }

  /* ── Banner wrapper ── */
  .banner-wrapper {
    display: none;
    margin: 40px auto 60px;
  }
  .banner-wrapper.active { display: block; }

  /* ── Banner (the flyer itself) ── */
  .banner {
    position: relative;
    background: #fffdf5;
    overflow: hidden;
  }

  /* Outer gold border */
  .banner::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 3.5px solid #c9a84c;
    border-radius: 4px;
    pointer-events: none;
    z-index: 2;
  }
  /* Inner gold border */
  .banner::after {
    content: '';
    position: absolute;
    inset: 15px;
    border: 1.5px solid #c9a84c;
    border-radius: 2px;
    pointer-events: none;
    z-index: 2;
  }

  /* Corner flourishes */
  .corner {
    position: absolute;
    z-index: 3;
    color: #c9a84c;
    font-size: var(--corner-size, 22px);
    line-height: 1;
    pointer-events: none;
  }
  .corner.tl { top: 18px; left: 18px; }
  .corner.tr { top: 18px; right: 18px; }
  .corner.bl { bottom: 18px; left: 18px; }
  .corner.br { bottom: 18px; right: 18px; }

  /* ── Content inside banner ── */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--pad-y) var(--pad-x);
    gap: var(--section-gap);
  }

  /* ── 1. Logo area ── */
  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--logo-gap);
  }
  .logo-hearts { position: relative; width: var(--hearts-w); height: var(--hearts-h); flex-shrink: 0; }
  .logo-divider {
    width: 2px;
    height: var(--divider-h);
    background: #c9a84c;
    flex-shrink: 0;
  }
  .logo-text { text-align: left; }
  .logo-text .brand {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: var(--brand-fs);
    color: #1a1a1a;
    letter-spacing: 2px;
  }
  .logo-text .brand .bracket { color: #c9a84c; }
  .logo-text .brand .m-letter { color: #c0392b; }
  .logo-text .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--subtitle-fs);
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── 2. Trust badges ── */
  .trust-badges {
    display: flex;
    justify-content: center;
    gap: var(--badge-gap);
    flex-wrap: wrap;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge-icon {
    width: var(--badge-icon-size);
    height: var(--badge-icon-size);
    flex-shrink: 0;
  }
  .badge-text {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: var(--badge-fs);
    text-transform: uppercase;
    color: #1a1a1a;
    letter-spacing: 0.5px;
  }

  /* ── 3. Main headline ── */
  .main-headline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: var(--headline-fs);
    color: #8b1a1a;
    text-align: center;
    line-height: 1.35;
    max-width: 90%;
  }

  /* ── Phone Mockup ── */
  .phone-section {
    display: flex; justify-content: center;
  }
  .phone-mockup {
    position: relative;
    width: var(--phone-w);
    background: linear-gradient(145deg, #2a2a2e 0%, #1a1a1e 50%, #2a2a2e 100%);
    border-radius: var(--phone-radius);
    padding: var(--phone-pad);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .phone-mockup::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: var(--phone-radius);
    border: 1.5px solid rgba(255,255,255,0.1);
    pointer-events: none;
  }
  .phone-screen {
    background: #fff;
    border-radius: calc(var(--phone-radius) - 4px);
    overflow: hidden;
    aspect-ratio: 9 / 19.5;
    display: flex; flex-direction: column;
  }
  .phone-island {
    width: 28%; height: 3.5%;
    background: #000; border-radius: 20px;
    margin: 3% auto 0;
  }
  .phone-status {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1% 8% 0;
    font-size: var(--ph-status-fs); font-weight: 600; color: #333;
    flex-shrink: 0;
  }
  .phone-status-icons { display: flex; align-items: center; gap: 2px; }
  .phone-status-icons svg { width: var(--ph-status-fs); height: var(--ph-status-fs); }
  .phone-status-icons svg:last-child { width: calc(var(--ph-status-fs) * 1.6); }
  .ph-body {
    padding: 4% 7%; flex: 1;
    display: flex; flex-direction: column;
    justify-content: center; gap: 3%;
  }
  .ph-label {
    font-size: var(--ph-label-fs); font-weight: 600; color: #999;
    text-transform: uppercase; letter-spacing: 0.8px; text-align: center;
  }
  .ph-title {
    font-size: var(--ph-title-fs); font-weight: 800; color: #1a1a1a;
    text-align: center; line-height: 1.2;
  }
  .ph-levels { width: 100%; display: flex; flex-direction: column; gap: 4%; }
  .ph-level {
    display: flex; align-items: center;
    background: #f8f8f8; border-radius: 8px;
    padding: 4% 5%; gap: 5%;
  }
  .ph-level-dot {
    width: var(--ph-dot-size); height: var(--ph-dot-size); min-width: var(--ph-dot-size);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .ph-level-dot svg { width: 55%; height: 55%; }
  .ph-level-info { flex: 1; text-align: left; }
  .ph-level-name { font-size: var(--ph-name-fs); font-weight: 700; color: #1a1a1a; display: block; }
  .ph-level-desc { font-size: var(--ph-desc-fs); color: #888; display: block; }
  .ph-level-price { font-size: var(--ph-price-fs); font-weight: 800; color: #1a1a1a; white-space: nowrap; }
  .ph-tab-bar {
    display: flex; justify-content: space-evenly; align-items: center;
    padding: 2% 0 1%;
    border-top: 1px solid rgba(0,0,0,0.06);
    flex-shrink: 0; margin-top: auto;
  }
  .ph-tab { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .ph-tab svg { width: var(--ph-tab-icon); height: var(--ph-tab-icon); }
  .ph-tab span { font-size: var(--ph-tab-fs); font-weight: 600; color: #aaa; }
  .ph-tab.active span { color: #c0392b; }
  .ph-tab.active svg { color: #c0392b; }
  .ph-home-bar {
    width: 28%; height: 3px; background: #1a1a1a; border-radius: 3px;
    margin: 2px auto 3%; opacity: 0.2; flex-shrink: 0;
  }

  /* ── 4. Features ── */
  .features {
    display: flex;
    flex-direction: column;
    gap: var(--feature-gap);
    width: 88%;
  }
  .feature {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: var(--feature-fs);
    line-height: 1.45;
  }
  .feature .bullet {
    color: #c0392b;
    font-size: var(--feature-fs);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .feature strong { font-weight: 700; }

  /* ── 5. CTA text ── */
  .cta-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: var(--cta-fs);
    color: #8b1a1a;
    text-align: center;
  }

  /* ── 6. Contact section ── */
  .contact-section {
    display: flex;
    align-items: center;
    gap: var(--contact-outer-gap);
  }
  .contact-rows {
    display: flex;
    flex-direction: column;
    gap: var(--contact-gap);
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .contact-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: var(--contact-label-fs);
    color: #1a1a1a;
    min-width: var(--contact-label-w);
    text-align: right;
  }
  .contact-box {
    background: linear-gradient(135deg, #c0392b, #a8322a, #c9a84c);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--contact-box-fs);
    padding: var(--contact-box-pad);
    border-radius: 6px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* ── 7. Approved stamp ── */
  .approved-stamp {
    width: var(--stamp-size);
    height: var(--stamp-size);
    border: 3px solid #c0392b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-12deg);
    flex-shrink: 0;
    position: relative;
  }
  .approved-stamp::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1.5px solid #c0392b;
    border-radius: 50%;
  }
  .stamp-inner { text-align: center; }
  .stamp-inner .stamp-top {
    font-size: var(--stamp-small-fs);
    font-weight: 700;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stamp-inner .stamp-main {
    font-size: var(--stamp-main-fs);
    font-weight: 800;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .stamp-inner .stamp-bottom {
    font-size: var(--stamp-small-fs);
    font-weight: 700;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── 8. QR code section ── */
  .qr-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--qr-gap);
  }
  .qr-leaf { width: var(--leaf-w); height: auto; color: #c9a84c; }
  .qr-center { text-align: center; }
  .qr-center img {
    width: var(--qr-size);
    height: var(--qr-size);
    display: block;
    margin: 0 auto;
  }
  .qr-center .scan-me {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: var(--scan-fs);
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* ── 9. Social media bar ── */
  .social-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: var(--social-gap);
  }
  .social-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .social-icon { width: var(--social-icon-size); height: var(--social-icon-size); }
  .social-text {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--social-fs);
    color: #1a1a1a;
  }

  /* ===================================
     SIZE VARIABLES
     =================================== */

  /* A5 - 560px wide */
  .size-a5 .banner {
    width: 560px;
    --pad-y: 36px; --pad-x: 30px;
    --section-gap: 14px;
    --corner-size: 18px;
    --logo-gap: 10px; --hearts-w: 40px; --hearts-h: 36px;
    --divider-h: 34px; --brand-fs: 20px; --subtitle-fs: 7px;
    --badge-gap: 14px; --badge-icon-size: 16px; --badge-fs: 6.5px;
    --headline-fs: 15px;
    --feature-gap: 6px; --feature-fs: 10px;
    --cta-fs: 12px;
    --contact-outer-gap: 14px;
    --contact-gap: 5px; --contact-label-fs: 9px; --contact-label-w: 70px;
    --contact-box-fs: 8px; --contact-box-pad: 5px 10px;
    --stamp-size: 60px; --stamp-main-fs: 10px; --stamp-small-fs: 5px;
    --qr-gap: 10px; --leaf-w: 30px; --qr-size: 60px; --scan-fs: 7px;
    --social-gap: 18px; --social-icon-size: 14px; --social-fs: 8px;
    --phone-w: 90px; --phone-radius: 14px; --phone-pad: 5px;
    --ph-status-fs: 6px; --ph-label-fs: 4px; --ph-title-fs: 7px;
    --ph-dot-size: 12px; --ph-name-fs: 5px; --ph-desc-fs: 3.5px; --ph-price-fs: 6px;
    --ph-tab-icon: 7px; --ph-tab-fs: 3.5px;
  }

  /* A4 - 794px wide (DEFAULT) */
  .size-a4 .banner {
    width: 794px;
    --pad-y: 50px; --pad-x: 44px;
    --section-gap: 20px;
    --corner-size: 24px;
    --logo-gap: 14px; --hearts-w: 56px; --hearts-h: 50px;
    --divider-h: 46px; --brand-fs: 28px; --subtitle-fs: 9.5px;
    --badge-gap: 22px; --badge-icon-size: 20px; --badge-fs: 8.5px;
    --headline-fs: 21px;
    --feature-gap: 9px; --feature-fs: 13.5px;
    --cta-fs: 16px;
    --contact-outer-gap: 20px;
    --contact-gap: 7px; --contact-label-fs: 12px; --contact-label-w: 95px;
    --contact-box-fs: 11px; --contact-box-pad: 7px 14px;
    --stamp-size: 82px; --stamp-main-fs: 13px; --stamp-small-fs: 6.5px;
    --qr-gap: 14px; --leaf-w: 40px; --qr-size: 82px; --scan-fs: 9px;
    --social-gap: 26px; --social-icon-size: 18px; --social-fs: 11px;
    --phone-w: 120px; --phone-radius: 18px; --phone-pad: 6px;
    --ph-status-fs: 8px; --ph-label-fs: 5px; --ph-title-fs: 9px;
    --ph-dot-size: 16px; --ph-name-fs: 6.5px; --ph-desc-fs: 4.5px; --ph-price-fs: 8px;
    --ph-tab-icon: 9px; --ph-tab-fs: 4.5px;
  }

  /* A3 - 900px wide */
  .size-a3 .banner {
    width: 900px;
    --pad-y: 58px; --pad-x: 50px;
    --section-gap: 24px;
    --corner-size: 28px;
    --logo-gap: 16px; --hearts-w: 64px; --hearts-h: 58px;
    --divider-h: 54px; --brand-fs: 32px; --subtitle-fs: 11px;
    --badge-gap: 26px; --badge-icon-size: 24px; --badge-fs: 10px;
    --headline-fs: 24px;
    --feature-gap: 11px; --feature-fs: 15.5px;
    --cta-fs: 19px;
    --contact-outer-gap: 24px;
    --contact-gap: 9px; --contact-label-fs: 14px; --contact-label-w: 108px;
    --contact-box-fs: 13px; --contact-box-pad: 8px 16px;
    --stamp-size: 94px; --stamp-main-fs: 15px; --stamp-small-fs: 7.5px;
    --qr-gap: 16px; --leaf-w: 46px; --qr-size: 94px; --scan-fs: 10px;
    --social-gap: 30px; --social-icon-size: 20px; --social-fs: 12.5px;
    --phone-w: 140px; --phone-radius: 20px; --phone-pad: 7px;
    --ph-status-fs: 9px; --ph-label-fs: 6px; --ph-title-fs: 10px;
    --ph-dot-size: 18px; --ph-name-fs: 7px; --ph-desc-fs: 5px; --ph-price-fs: 9px;
    --ph-tab-icon: 10px; --ph-tab-fs: 5px;
  }

  /* A2 - 1100px wide */
  .size-a2 .banner {
    width: 1100px;
    --pad-y: 72px; --pad-x: 62px;
    --section-gap: 30px;
    --corner-size: 34px;
    --logo-gap: 20px; --hearts-w: 80px; --hearts-h: 72px;
    --divider-h: 66px; --brand-fs: 40px; --subtitle-fs: 14px;
    --badge-gap: 32px; --badge-icon-size: 28px; --badge-fs: 12.5px;
    --headline-fs: 30px;
    --feature-gap: 14px; --feature-fs: 19px;
    --cta-fs: 23px;
    --contact-outer-gap: 30px;
    --contact-gap: 11px; --contact-label-fs: 17px; --contact-label-w: 132px;
    --contact-box-fs: 16px; --contact-box-pad: 10px 20px;
    --stamp-size: 116px; --stamp-main-fs: 19px; --stamp-small-fs: 9px;
    --qr-gap: 20px; --leaf-w: 56px; --qr-size: 116px; --scan-fs: 13px;
    --social-gap: 38px; --social-icon-size: 24px; --social-fs: 15px;
    --phone-w: 165px; --phone-radius: 24px; --phone-pad: 8px;
    --ph-status-fs: 11px; --ph-label-fs: 7px; --ph-title-fs: 12px;
    --ph-dot-size: 22px; --ph-name-fs: 8.5px; --ph-desc-fs: 6px; --ph-price-fs: 10px;
    --ph-tab-icon: 12px; --ph-tab-fs: 6px;
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <button onclick="switchSize('a5')">A5</button>
  <button onclick="switchSize('a4')" class="active">A4</button>
  <button onclick="switchSize('a3')">A3</button>
  <button onclick="switchSize('a2')">A2</button>
</div>

<!-- A5 -->
<div class="banner-wrapper size-a5" id="size-a5">
  <div class="banner" id="banner-a5"></div>
</div>

<!-- A4 (default active) -->
<div class="banner-wrapper size-a4 active" id="size-a4">
  <div class="banner" id="banner-a4"></div>
</div>

<!-- A3 -->
<div class="banner-wrapper size-a3" id="size-a3">
  <div class="banner" id="banner-a3"></div>
</div>

<!-- A2 -->
<div class="banner-wrapper size-a2" id="size-a2">
  <div class="banner" id="banner-a2"></div>
</div>

// Size switcher
function switchSize(size) {
  document.querySelectorAll('.banner-wrapper').forEach(function(w) { w.classList.remove('active'); });
  document.querySelectorAll('.toolbar button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('size-' + size).classList.add('active');
  var buttons = document.querySelectorAll('.toolbar button');
  buttons.forEach(function(b) {
    if (b.textContent.toLowerCase() === size) b.classList.add('active');
  });
}
