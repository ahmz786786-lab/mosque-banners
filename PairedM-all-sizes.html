<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PairedM — All Sizes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2c2c2c;
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* ── Toolbar ── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    width: 100%;
    background: #1a1a1a;
    border-bottom: 2px solid #c9a84c;
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
  }
  .toolbar button {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 8px 22px;
    border: 2px solid #c9a84c;
    border-radius: 6px;
    background: transparent;
    color: #c9a84c;
    cursor: pointer;
    transition: all .2s;
  }
  .toolbar button:hover { background: rgba(201,168,76,.15); }
  .toolbar button.active {
    background: #c9a84c;
    color: #1a1a1a;
  }

  /* ── Banner wrapper ── */
  .banner-wrapper {
    display: none;
    margin: 40px auto 60px;
  }
  .banner-wrapper.active { display: block; }

  /* ── Banner (the flyer itself) ── */
  .banner {
    position: relative;
    background: #fffdf5;
    overflow: hidden;
  }

  /* Outer gold border */
  .banner::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 3.5px solid #c9a84c;
    border-radius: 4px;
    pointer-events: none;
    z-index: 2;
  }
  /* Inner gold border */
  .banner::after {
    content: '';
    position: absolute;
    inset: 15px;
    border: 1.5px solid #c9a84c;
    border-radius: 2px;
    pointer-events: none;
    z-index: 2;
  }

  /* Corner flourishes */
  .corner {
    position: absolute;
    z-index: 3;
    color: #c9a84c;
    font-size: var(--corner-size, 22px);
    line-height: 1;
    pointer-events: none;
  }
  .corner.tl { top: 18px; left: 18px; }
  .corner.tr { top: 18px; right: 18px; }
  .corner.bl { bottom: 18px; left: 18px; }
  .corner.br { bottom: 18px; right: 18px; }

  /* ── Content inside banner ── */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--pad-y) var(--pad-x);
    gap: var(--section-gap);
  }

  /* ── 1. Logo area ── */
  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--logo-gap);
  }
  .logo-hearts { position: relative; width: var(--hearts-w); height: var(--hearts-h); flex-shrink: 0; }
  .logo-divider {
    width: 2px;
    height: var(--divider-h);
    background: #c9a84c;
    flex-shrink: 0;
  }
  .logo-text { text-align: left; }
  .logo-text .brand {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: var(--brand-fs);
    color: #1a1a1a;
    letter-spacing: 2px;
  }
  .logo-text .brand .bracket { color: #c9a84c; }
  .logo-text .brand .m-letter { color: #c0392b; }
  .logo-text .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--subtitle-fs);
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── 2. Trust badges ── */
  .trust-badges {
    display: flex;
    justify-content: center;
    gap: var(--badge-gap);
    flex-wrap: wrap;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge-icon {
    width: var(--badge-icon-size);
    height: var(--badge-icon-size);
    flex-shrink: 0;
  }
  .badge-text {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: var(--badge-fs);
    text-transform: uppercase;
    color: #1a1a1a;
    letter-spacing: 0.5px;
  }

  /* ── 3. Main headline ── */
  .main-headline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: var(--headline-fs);
    color: #8b1a1a;
    text-align: center;
    line-height: 1.35;
    max-width: 90%;
  }

  /* ── 4. Features ── */
  .features {
    display: flex;
    flex-direction: column;
    gap: var(--feature-gap);
    width: 88%;
  }
  .feature {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: var(--feature-fs);
    line-height: 1.45;
  }
  .feature .bullet {
    color: #c0392b;
    font-size: var(--feature-fs);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .feature strong { font-weight: 700; }

  /* ── 5. CTA text ── */
  .cta-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: var(--cta-fs);
    color: #8b1a1a;
    text-align: center;
  }

  /* ── 6. Contact section ── */
  .contact-section {
    display: flex;
    align-items: center;
    gap: var(--contact-outer-gap);
  }
  .contact-rows {
    display: flex;
    flex-direction: column;
    gap: var(--contact-gap);
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .contact-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: var(--contact-label-fs);
    color: #1a1a1a;
    min-width: var(--contact-label-w);
    text-align: right;
  }
  .contact-box {
    background: linear-gradient(135deg, #c0392b, #a8322a, #c9a84c);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--contact-box-fs);
    padding: var(--contact-box-pad);
    border-radius: 6px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* ── 7. Approved stamp ── */
  .approved-stamp {
    width: var(--stamp-size);
    height: var(--stamp-size);
    border: 3px solid #c0392b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-12deg);
    flex-shrink: 0;
    position: relative;
  }
  .approved-stamp::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1.5px solid #c0392b;
    border-radius: 50%;
  }
  .stamp-inner { text-align: center; }
  .stamp-inner .stamp-top {
    font-size: var(--stamp-small-fs);
    font-weight: 700;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stamp-inner .stamp-main {
    font-size: var(--stamp-main-fs);
    font-weight: 800;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .stamp-inner .stamp-bottom {
    font-size: var(--stamp-small-fs);
    font-weight: 700;
    color: #c0392b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── 8. QR code section ── */
  .qr-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--qr-gap);
  }
  .qr-leaf { width: var(--leaf-w); height: auto; color: #c9a84c; }
  .qr-center { text-align: center; }
  .qr-center img {
    width: var(--qr-size);
    height: var(--qr-size);
    display: block;
    margin: 0 auto;
  }
  .qr-center .scan-me {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: var(--scan-fs);
    color: #1a1a1a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* ── 9. Social media bar ── */
  .social-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: var(--social-gap);
  }
  .social-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .social-icon { width: var(--social-icon-size); height: var(--social-icon-size); }
  .social-text {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: var(--social-fs);
    color: #1a1a1a;
  }

  /* ===================================
     SIZE VARIABLES
     =================================== */

  /* A5 - 560px wide */
  .size-a5 .banner {
    width: 560px;
    --pad-y: 36px; --pad-x: 30px;
    --section-gap: 14px;
    --corner-size: 18px;
    --logo-gap: 10px; --hearts-w: 40px; --hearts-h: 36px;
    --divider-h: 34px; --brand-fs: 20px; --subtitle-fs: 7px;
    --badge-gap: 14px; --badge-icon-size: 16px; --badge-fs: 6.5px;
    --headline-fs: 15px;
    --feature-gap: 6px; --feature-fs: 10px;
    --cta-fs: 12px;
    --contact-outer-gap: 14px;
    --contact-gap: 5px; --contact-label-fs: 9px; --contact-label-w: 70px;
    --contact-box-fs: 8px; --contact-box-pad: 5px 10px;
    --stamp-size: 60px; --stamp-main-fs: 10px; --stamp-small-fs: 5px;
    --qr-gap: 10px; --leaf-w: 30px; --qr-size: 60px; --scan-fs: 7px;
    --social-gap: 18px; --social-icon-size: 14px; --social-fs: 8px;
  }

  /* A4 - 794px wide (DEFAULT) */
  .size-a4 .banner {
    width: 794px;
    --pad-y: 50px; --pad-x: 44px;
    --section-gap: 20px;
    --corner-size: 24px;
    --logo-gap: 14px; --hearts-w: 56px; --hearts-h: 50px;
    --divider-h: 46px; --brand-fs: 28px; --subtitle-fs: 9.5px;
    --badge-gap: 22px; --badge-icon-size: 20px; --badge-fs: 8.5px;
    --headline-fs: 21px;
    --feature-gap: 9px; --feature-fs: 13.5px;
    --cta-fs: 16px;
    --contact-outer-gap: 20px;
    --contact-gap: 7px; --contact-label-fs: 12px; --contact-label-w: 95px;
    --contact-box-fs: 11px; --contact-box-pad: 7px 14px;
    --stamp-size: 82px; --stamp-main-fs: 13px; --stamp-small-fs: 6.5px;
    --qr-gap: 14px; --leaf-w: 40px; --qr-size: 82px; --scan-fs: 9px;
    --social-gap: 26px; --social-icon-size: 18px; --social-fs: 11px;
  }

  /* A3 - 900px wide */
  .size-a3 .banner {
    width: 900px;
    --pad-y: 58px; --pad-x: 50px;
    --section-gap: 24px;
    --corner-size: 28px;
    --logo-gap: 16px; --hearts-w: 64px; --hearts-h: 58px;
    --divider-h: 54px; --brand-fs: 32px; --subtitle-fs: 11px;
    --badge-gap: 26px; --badge-icon-size: 24px; --badge-fs: 10px;
    --headline-fs: 24px;
    --feature-gap: 11px; --feature-fs: 15.5px;
    --cta-fs: 19px;
    --contact-outer-gap: 24px;
    --contact-gap: 9px; --contact-label-fs: 14px; --contact-label-w: 108px;
    --contact-box-fs: 13px; --contact-box-pad: 8px 16px;
    --stamp-size: 94px; --stamp-main-fs: 15px; --stamp-small-fs: 7.5px;
    --qr-gap: 16px; --leaf-w: 46px; --qr-size: 94px; --scan-fs: 10px;
    --social-gap: 30px; --social-icon-size: 20px; --social-fs: 12.5px;
  }

  /* A2 - 1100px wide */
  .size-a2 .banner {
    width: 1100px;
    --pad-y: 72px; --pad-x: 62px;
    --section-gap: 30px;
    --corner-size: 34px;
    --logo-gap: 20px; --hearts-w: 80px; --hearts-h: 72px;
    --divider-h: 66px; --brand-fs: 40px; --subtitle-fs: 14px;
    --badge-gap: 32px; --badge-icon-size: 28px; --badge-fs: 12.5px;
    --headline-fs: 30px;
    --feature-gap: 14px; --feature-fs: 19px;
    --cta-fs: 23px;
    --contact-outer-gap: 30px;
    --contact-gap: 11px; --contact-label-fs: 17px; --contact-label-w: 132px;
    --contact-box-fs: 16px; --contact-box-pad: 10px 20px;
    --stamp-size: 116px; --stamp-main-fs: 19px; --stamp-small-fs: 9px;
    --qr-gap: 20px; --leaf-w: 56px; --qr-size: 116px; --scan-fs: 13px;
    --social-gap: 38px; --social-icon-size: 24px; --social-fs: 15px;
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <button onclick="switchSize('a5')">A5</button>
  <button onclick="switchSize('a4')" class="active">A4</button>
  <button onclick="switchSize('a3')">A3</button>
  <button onclick="switchSize('a2')">A2</button>
</div>

<!-- A5 -->
<div class="banner-wrapper size-a5" id="size-a5">
  <div class="banner" id="banner-a5"></div>
</div>

<!-- A4 (default active) -->
<div class="banner-wrapper size-a4 active" id="size-a4">
  <div class="banner" id="banner-a4"></div>
</div>

<!-- A3 -->
<div class="banner-wrapper size-a3" id="size-a3">
  <div class="banner" id="banner-a3"></div>
</div>

<!-- A2 -->
<div class="banner-wrapper size-a2" id="size-a2">
  <div class="banner" id="banner-a2"></div>
</div>

<script>
// SVG Icons
const svgHearts = `<svg viewBox="0 0 60 54" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
  <path d="M26 48 C26 48 2 32 2 16 C2 7 9 1 17 1 C22 1 25.5 4 27 8 C28.5 4 32 1 37 1 C45 1 52 7 52 16 C52 32 26 48 26 48Z" fill="#c0392b"/>
  <path d="M38 38 C38 38 20 26 20 14 C20 8 25 4 30 4 C34 4 36.5 6 38 9 C39.5 6 42 4 46 4 C51 4 56 8 56 14 C56 26 38 38 38 38Z" fill="#e74c3c"/>
</svg>`;

const svgHouse = `<svg viewBox="0 0 24 24" fill="#c0392b" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>`;

const svgCheck = `<svg viewBox="0 0 24 24" fill="#c9a84c" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;

const svgPerson = `<svg viewBox="0 0 24 24" fill="#c0392b" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

const svgInstagram = `<svg viewBox="0 0 24 24" fill="#c0392b" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 01-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 017.8 2zm-.2 2A3.6 3.6 0 004 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 003.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6zm9.65 1.5a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5zM12 7a5 5 0 110 10 5 5 0 010-10zm0 2a3 3 0 100 6 3 3 0 000-6z"/></svg>`;

const svgFacebook = `<svg viewBox="0 0 24 24" fill="#3b5998" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>`;

const svgLeafLeft = `<svg viewBox="0 0 50 80" fill="none" stroke="#c9a84c" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
  <path d="M40 75 C40 75 38 40 25 20 C18 9 10 5 10 5" stroke-linecap="round"/>
  <path d="M25 55 C18 52 12 56 8 60" stroke-linecap="round"/>
  <path d="M28 42 C20 38 14 42 10 46" stroke-linecap="round"/>
  <path d="M26 30 C20 26 14 28 10 32" stroke-linecap="round"/>
  <ellipse cx="25" cy="20" rx="6" ry="10" stroke="#c9a84c" fill="none" transform="rotate(-15 25 20)"/>
</svg>`;

const svgLeafRight = `<svg viewBox="0 0 50 80" fill="none" stroke="#c9a84c" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;transform:scaleX(-1)">
  <path d="M40 75 C40 75 38 40 25 20 C18 9 10 5 10 5" stroke-linecap="round"/>
  <path d="M25 55 C18 52 12 56 8 60" stroke-linecap="round"/>
  <path d="M28 42 C20 38 14 42 10 46" stroke-linecap="round"/>
  <path d="M26 30 C20 26 14 28 10 32" stroke-linecap="round"/>
  <ellipse cx="25" cy="20" rx="6" ry="10" stroke="#c9a84c" fill="none" transform="rotate(-15 25 20)"/>
</svg>`;

// Build the banner content (identical for all sizes; CSS vars handle scaling)
function bannerHTML() {
  return `
    <span class="corner tl">\u2766</span>
    <span class="corner tr">\u2766</span>
    <span class="corner bl">\u2766</span>
    <span class="corner br">\u2766</span>

    <div class="content">

      <!-- 1. Logo -->
      <div class="logo-area">
        <div class="logo-hearts">${svgHearts}</div>
        <div class="logo-divider"></div>
        <div class="logo-text">
          <div class="brand">PAIRED <span class="bracket">[</span><span class="m-letter">M</span><span class="bracket">]</span></div>
          <div class="subtitle">Unite by Meeting</div>
        </div>
      </div>

      <!-- 2. Trust badges -->
      <div class="trust-badges">
        <div class="badge">
          <div class="badge-icon">${svgHouse}</div>
          <span class="badge-text">Nationwide Availability</span>
        </div>
        <div class="badge">
          <div class="badge-icon">${svgCheck}</div>
          <span class="badge-text">Simple &amp; Stress Free Booking Process</span>
        </div>
        <div class="badge">
          <div class="badge-icon">${svgPerson}</div>
          <span class="badge-text">English Speaking Imams</span>
        </div>
      </div>

      <!-- 3. Main headline -->
      <div class="main-headline">
        A revolutionary Nikah service that matches only through face to face meetings.
      </div>

      <!-- 4. Features -->
      <div class="features">
        <div class="feature">
          <span class="bullet">\u25B6</span>
          <span><strong>Professional coordinators</strong> that helps you every step of the way!!</span>
        </div>
        <div class="feature">
          <span class="bullet">\u25B6</span>
          <span><strong>No subscription fees</strong> pay as you go basis at every meeting..</span>
        </div>
        <div class="feature">
          <span class="bullet">\u25B6</span>
          <span><strong>Post marriage consultancy</strong> and pre marriage courses!</span>
        </div>
        <div class="feature">
          <span class="bullet">\u25B6</span>
          <span><strong>Certified halal product</strong> as approved by our Islamic Board of Scholars.</span>
        </div>
      </div>

      <!-- 5. CTA -->
      <div class="cta-text">Be the first to register for free &amp; activate your account</div>

      <!-- 6 & 7. Contact + Approved stamp -->
      <div class="contact-section">
        <div class="contact-rows">
          <div class="contact-row">
            <span class="contact-label">Visit</span>
            <span class="contact-box">www.pairedm.co.uk</span>
          </div>
          <div class="contact-row">
            <span class="contact-label">Or enquire at</span>
            <span class="contact-box">Info@pairedM.co.uk</span>
          </div>
        </div>
        <div class="approved-stamp">
          <div class="stamp-inner">
            <div class="stamp-top">Halal</div>
            <div class="stamp-main">Approved</div>
            <div class="stamp-bottom">Certified</div>
          </div>
        </div>
      </div>

      <!-- 8. QR code -->
      <div class="qr-section">
        <div class="qr-leaf">${svgLeafLeft}</div>
        <div class="qr-center">
          <img src="images/qr-pairedm.png" alt="QR Code">
          <div class="scan-me">Scan Me</div>
        </div>
        <div class="qr-leaf">${svgLeafRight}</div>
      </div>

      <!-- 9. Social -->
      <div class="social-bar">
        <div class="social-item">
          <div class="social-icon">${svgInstagram}</div>
          <span class="social-text">@pairedm_</span>
        </div>
        <div class="social-item">
          <div class="social-icon">${svgFacebook}</div>
          <span class="social-text">paired-M</span>
        </div>
      </div>

    </div>`;
}

// Populate all 4 banners
['a5','a4','a3','a2'].forEach(function(s) {
  document.getElementById('banner-' + s).innerHTML = bannerHTML();
});

// Size switcher
function switchSize(size) {
  document.querySelectorAll('.banner-wrapper').forEach(function(w) { w.classList.remove('active'); });
  document.querySelectorAll('.toolbar button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('size-' + size).classList.add('active');
  var buttons = document.querySelectorAll('.toolbar button');
  buttons.forEach(function(b) {
    if (b.textContent.toLowerCase() === size) b.classList.add('active');
  });
}
</script>
</body>
</html>
