<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Banners</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; }
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(26,26,46,0.95); backdrop-filter: blur(12px);
    padding: 16px 24px; display: flex; align-items: center; justify-content: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .nav-title { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.5); margin-right: 8px; }
  .nav-btn {
    padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 700;
    border: 2px solid rgba(255,255,255,0.15); background: transparent; color: #fff;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-btn:hover { border-color: #d4af37; color: #d4af37; }
  .nav-btn.active { background: #d4af37; border-color: #d4af37; color: #1a1a2e; }
  .nav-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.15); margin: 0 8px; }
  .nav-btn.print { border-color: rgba(76,175,80,0.4); color: #4CAF50; font-size: 12px; }
  .nav-btn.print:hover { border-color: #4CAF50; background: rgba(76,175,80,0.15); }
  .frame-wrapper { padding-top: 70px; width: 100%; height: 100vh; }
  iframe { width: 100%; height: calc(100vh - 70px); border: none; }
</style>
</head>
<body>
  <div class="nav">
    <span class="nav-title">Banners:</span>
    <button class="nav-btn active" onclick="show('halal-scanning-app.html', this)">Halal Scanning App</button>
    <button class="nav-btn" onclick="show('PairedM-all-sizes.html', this)">PairedM</button>
    <button class="nav-btn" onclick="show('plan-my-estate-all-sizes.html', this)">Plan My Estate</button>
    <div class="nav-sep"></div>
    <button class="nav-btn print" onclick="show('HalalScanningApp-A3-PRINT.html', this)">Halal A3 Print</button>
    <button class="nav-btn print" onclick="show('PairedM-A3-PRINT.html', this)">PairedM A3 Print</button>
    <button class="nav-btn print" onclick="show('PlanMyEstate-A3-PRINT.html', this)">Estate A3 Print</button>
  </div>
  <div class="frame-wrapper">
    <iframe id="banner-frame" src="halal-scanning-app.html"></iframe>
  </div>
  <script>
    function show(file, btn) {
      document.getElementById('banner-frame').src = file;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
